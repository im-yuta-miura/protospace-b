<!DOCTYPE html>
<header th:fragment="header" xmlns:th="http://www.thymeleaf.org"  class="header">
  
  <a th:href="@{/}">
    <img th:src="@{/images/logo.png}" class="logo">
  </a>

  <form th:action="@{/prototypes/search}" method="get" th:object="${searchForm}" class="search-form">
    <input type="text" th:field="*{title}" name="title" placeholder="キーワードを入力" class="search-input" />
    <input type="submit" class="search-btn" value="検索" />
  </form>

  <!-- ログイン時に表示される -->
  <div class="nav" th:if="${#authorization.expression('isAuthenticated()')}">
    <form th:action="@{/logout}" method="post">
      <input class="button_logout" type="submit" value="ログアウト"/>
    </form>
    <a class="button" th:href="@{/prototypes/new}">New Proto</a>
  </div>

  <!-- 未ログイン時に表示される -->
  <div class="nav" th:if="${#authorization.expression('!isAuthenticated()')}">
    <a class="button" th:href="@{/users/sign_up}">新規登録</a>
    <a class="button" th:href="@{/users/login}">ログイン</a>
  </div>

</header>
