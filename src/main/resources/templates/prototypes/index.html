<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
  <title>PROTO SPACE</title>
</head>

<body>

<div th:insert="~{header :: header}"></div>

<div class="contents_area">
  <div sec:authorize="isAuthenticated()" th:if="${name != null}">
    <p th:text="${name} + 'さん、こんにちは'"></p>
  </div>
  <div class="contents">
    <div th:each="prototype : ${prototypes}" class="content_prototype">
      <a th:href="@{/prototypes/{id}(id=${prototype.id})}">  
        <img class="image" th:src="${prototype.image}">
      </a>
      <div class="explain">
        <div class="info">
          <a th:href="@{/prototypes/{id}(id=${prototype.id})}" class="title-link">
            <p class="title" th:text="${prototype.title}"></p>
          </a>
          <p class="catchphrase" th:text="${prototype.catchphrase}"></p>
        </div>
        <p class="name" th:text="|by ${prototype.user_id}|"></p>
      </div>
    </div>
  </div>
</div>

<div th:insert="~{footer :: footer}"></div>

</body>
</html>
