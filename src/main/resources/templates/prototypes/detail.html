<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protospace</title>
  <link th:href="@{/css/reset.css}" rel="stylesheet" type="text/css">
  <link th:href="@{/css/common.css}" rel="stylesheet" type="text/css">
  <link th:href="@{/css/style.css}" rel="stylesheet" type="text/css">
</head>

<body class="body">

  <th:block th:replace="~{header :: header}"></th:block>

  <div class="main_container">

    <div class="contents_row">
      <!-- Frame46 -->
      <div class="content_post">
        <!-- Frame45 -->
        <div class="proto_name">
          <!-- Frame44 -->
          <div class="proto_titles">
            <!-- Frame39 -->
            <div class="proto_title">
              <p th:text="${prototype.title}"></p>
            </div>
            <a th:href="@{/users/{id}/mypage(id=${prototype.user.id})}" th:text="by + ${prototype.user.name}" class="username-link"></a>
          </div>

          <!-- Frame7 -->
          <div class="under_titles" sec:authorize="isAuthenticated()" th:if="${#authentication.principal.id == prototype.user.id}">
            <!-- Frame5 -->
            <a th:href="@{/prototypes/{id}/edit(id=${prototype.id})}" class="edit-btn" >編集する</a>
            <!-- Frame6 -->
            <a th:href="@{/prototypes/{id}/delete(id=${prototype.id})}" class="delete-btn" >削除する</a>
          </div>
        </div>
        <!-- Frame19 -->
        <img th:src="@{${prototype.image}}" class="image" alt="プロトタイプ画像">
      </div>
        
      <!-- Frame53 -->
      <div class="content_detail">
        <!-- Frame49 -->
        <div class="post-text">
          <!-- Frame47 -->
          <div class="catchphrase_box">
            <!-- Frame40 -->
            <div class="catchphrase_more">
              <p>キャッチコピー</p>
            </div>
            <!-- Frame41 -->
            <div class="catchphrase_text">
              <p th:text="${prototype.catchphrase}"></p>
            </div>
          </div>
          <!-- Frame48 -->
          <div class="concept_box">
            <!-- Frame42 -->
            <div class="concept_more">
              <p>コンセプト</p>
            </div>
            <!-- Frame43 -->
            <div class="concept_text">
              <p th:text="${prototype.concept}"></p>
            </div>
          </div>
        </div>
        <!-- Frame52 -->
        <div class="comment">
          <!-- Frame50 -->
          <form class="comment-form" th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{/prototypes/{id}/comment(id=${prototype.id})}" th:method="post" th:object="${commentForm}">
            <!-- Frame13 -->
            <div class="comment-post">
              <p>コメント</p>
              <input type="text" th:field="*{content}" class="comment-text">
            </div>
            <!-- Frame16 -->
            <div class="submit">
              <input type="submit" class="submit-btn" value="送信する">
            </div>
          </form>
          <!-- Frame54 -->
          <div class="comments_list">
            <!-- Frame51 -->
            <ul class="comments_contents" th:if="${prototype.comments != null}">
              <li th:each="comment : ${comments}" class="comment_item">
                <p>
                  <span th:text="${comment.content}"></span>
                  <a th:href="@{/users/{id}/mypage(id=${prototype.user.id})}" th:text="${prototype.user.name}" class="username-link"></a>
                </p>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>

<th:block th:replace="~{footer :: footer}"></th:block>

</body>
</html>
