<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー新規登録ページ</title>
  <!--  -->
  <link th:href="@{/css/reset.css}" rel="stylesheet" type="text/css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <!--  -->
  <link th:href="@{/css/users/form.css}" rel="stylesheet" type="text/css">
  <link th:href="@{/css/common.css}" rel="stylesheet" type="text/css">
</head>
<body>
  <th:block th:replace="~{header :: header}"></th:block>
  <div class="main_container">

    <div class="users_module">
      
      <h1 class="heading">ユーザー新規登録</h1>
      
      <ul th:if="${errorMessages != null and !errorMessages.empty}">
        <li th:each="message : ${errorMessages}" th:text="${message}" style="color: red;"></li>
      </ul>

      <form th:action="@{/user}" th:method="post" th:object="${userForm}" class="user_form">

        <div class="user_field_area">
          <div class="user_field">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" th:field="*{email}"  autofocus="autofocus"/>
          </div>

          <div class="user_field">
            <label for="password">パスワード（6文字以上）</label>
            <input type="password" id="password" th:field="*{password}"  autofocus="autofocus"/>
          </div>

          <div class="user_field">
            <label for="passwordConfirmation">パスワード再入力</label>
            <input type="password" id="passwordConfirmation" th:field="*{passwordConfirmation}"  autofocus="autofocus"/>
          </div>

          <div class="user_field">
            <label for="name">ユーザー名</label>
            <input type="text" id="name" th:field="*{name}"  autofocus="autofocus" />
          </div>

          <div class="user_field">
            <label for="profile">プロフィール</label>
            <textarea id="profile" th:field="*{profile}"></textarea>
          </div>
          
          <div class="user_field">
            <label for="affiliation">所属</label>
            <div>
              <select th:field="*{affiliationId}" id="affiliationSelect">
                <option value="0" disabled>所属を選択してください</option>
                <option
                  th:each="affiliation : ${affiliations}"
                  th:value="${affiliation.id}"
                  th:text="${affiliation.affiliation}">
                </option>
              </select>
              <button type="button" id="addAffiliationBtn">所属追加</button>
            </div>
          </div>

          <div class="user_field">
            <label for="position">役職</label>
            <div>
              <select th:field="*{positionId}" id="positionSelect">
                <option value="0" disabled>役職を選択してください</option>
                <option
                  th:each="position : ${positions}"
                  th:value="${position.id}"
                  th:text="${position.position}">
                </option>
              </select>
              <button type="button" id="addPositionBtn">役職追加</button>
            </div>
          </div>
        </div>
        
        <button class="submit_button" type="submit">新規登録</button>
      </form>
    </div>
  </div>
  <th:block th:replace="~{affiliation :: affiliationDialog}"></th:block>
  <th:block th:replace="~{position :: positionDialog}"></th:block>
  <th:block th:replace="~{footer :: footer}"></th:block>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {

      document.getElementById("addAffiliationBtn").addEventListener('click', (e) => {
        e.preventDefault();
        const dialog = document.getElementById("affiliationDialog");
        dialog.showModal();
      });

      document.getElementById("addPositionBtn").addEventListener('click', (e) => {
        e.preventDefault();
        const dialog = document.getElementById("positionDialog");
        dialog.showModal();
      });

      const affiliationDialog = document.getElementById("affiliationDialog");
      
      // 送信するボタンが押されたらfetchで送る
      document.getElementById("saveAffiliationBtn").addEventListener("click", async (e) => {
        e.preventDefault();
        const targetUrl = e.target.dataset.url;

        const inputElement = document.getElementById("affiliationInput"); 
        const requestAffiliation = inputElement.value;

        if (!requestAffiliation) {
          alert("所属名を入力してください。");
          return;
        }

        try {
          const response = await fetch(targetUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'text/plain',
            },
            body: requestAffiliation.trim()
          });

          if (response.status === 409) {
            alert(`「${requestAffiliation}」は既に存在します。別の名前を指定してください。`);
          } else if (response.ok) {
            
            // 🌟 追加: サーバーから返ってきたJSON（Affiliationオブジェクト）をパースする
            const responseData = await response.json();
            
            const selectElement = document.getElementById("affiliationSelect");
            
            if (selectElement) {
              const newOption = document.createElement("option");
              
              // 🌟 変更: JSONデータの id を value に、affiliation をテキストにセット！
              newOption.value = responseData.id;
              newOption.textContent = responseData.affiliation;
              
              selectElement.appendChild(newOption);
              
              // 追加した項目を自動選択
              newOption.selected = true; 
            }

            inputElement.value = "";
            affiliationDialog.close();
            
          } else {
            alert("予期せぬエラーが発生しました。ステータスコード: " + response.status);
          }
          
        } catch (error) {
          console.error("通信エラー:", error);
          alert("サーバーとの通信に失敗しました。");
        }
      });

      // 送信するボタンが押されたらfetchで送る
      document.getElementById("savePositionBtn").addEventListener("click", async (e) => {
        e.preventDefault();
        const targetUrl = e.target.dataset.url;

        const inputElement = document.getElementById("positionInput"); 
        const requestPosition = inputElement.value;

        if (!requestPosition) {
          alert("役職名を入力してください。");
          return;
        }

        try {
          const response = await fetch(targetUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'text/plain',
            },
            body: requestPosition.trim()
          });

          if (response.status === 409) {
            alert(`「${requestPosition}」は既に存在します。別の名前を指定してください。`);
          } else if (response.ok) {
            
            // 🌟 追加: サーバーから返ってきたJSON（Positionオブジェクト）をパースする
            const responseData = await response.json();
            
            const selectElement = document.getElementById("positionSelect");
            
            if (selectElement) {
              const newOption = document.createElement("option");
              
              // 🌟 変更: JSONデータの id を value に、position をテキストにセット！
              newOption.value = responseData.id;
              newOption.textContent = responseData.position;
              
              selectElement.appendChild(newOption);
              
              // 追加した項目を自動選択
              newOption.selected = true; 
            }

            inputElement.value = "";
            positionDialog.close(); // ダイアログの変数名も変更
            
          } else {
            alert("予期せぬエラーが発生しました。ステータスコード: " + response.status);
          }
          
        } catch (error) {
          console.error("通信エラー:", error);
          alert("サーバーとの通信に失敗しました。");
        }
      });

    });
  </script>
</body>
</html>
